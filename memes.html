<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memes Wall</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fafafa;
    overflow-x: hidden;
}

/* CENTER TITLE IMAGE */
.title-img {
    position: fixed;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 550px;
    z-index: 10;
}

/* BACK ARROW */
.back-arrow {
    position: fixed;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    cursor: pointer;
    transition: transform 0.2s ease;
    z-index: 10;
}

/* hover lift */
.back-arrow:hover {
    transform: translate(-50%, -60%);
}

/* Pinterest-style grid */
.grid {
    column-count: 3;
    column-gap: 15px;
    padding: 20px;
}

/* Meme images */
.grid img {
    width: 100%;
    margin-bottom: 15px;
    border-radius: 15px;
    cursor: pointer;
    break-inside: avoid;

    opacity: 0;
    transform: translateY(30px) scale(0.95);
    animation: popIn 0.6s ease forwards;

    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.grid img:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* stagger animation */
.grid img:nth-child(1) { animation-delay: 0.05s; }
.grid img:nth-child(2) { animation-delay: 0.1s; }
.grid img:nth-child(3) { animation-delay: 0.15s; }
.grid img:nth-child(4) { animation-delay: 0.2s; }
.grid img:nth-child(5) { animation-delay: 0.25s; }
.grid img:nth-child(6) { animation-delay: 0.3s; }
.grid img:nth-child(7) { animation-delay: 0.35s; }
.grid img:nth-child(8) { animation-delay: 0.4s; }
.grid img:nth-child(9) { animation-delay: 0.45s; }
.grid img:nth-child(10) { animation-delay: 0.5s; }
.grid img:nth-child(11) { animation-delay: 0.55s; }

@keyframes popIn {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
</style>
</head>

<body>

<!-- BACKGROUND MUSIC -->
<audio autoplay loop>
    <source src="supernatural.mp4" type="audio/mp4">
</audio>

<!-- TITLE -->
<img class="title-img" src="memes_title.png" alt="Memes Title">

<!-- BACK BUTTON -->
<a href="index.html">
    <img class="back-arrow" src="larrow.png" alt="back">
</a>

<!-- MEMES -->
<div class="grid">
    <img src="meme1.jpg">
    <img src="meme2.jpg">
    <img src="meme3.jpg">
    <img src="meme4.jpg">
    <img src="meme5.jpg">
    <img src="meme6.jpg">
    <img src="meme7.jpg">
    <img src="meme8.jpg">
    <img src="meme9.jpg">
    <img src="meme10.jpg">
    <img src="meme11.jpg">
</div>

</body>
</html>
