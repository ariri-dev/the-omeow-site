<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: url("lettersbg.jpg") center/cover no-repeat;
}

/* BACKGROUND BLUR */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
}

body.blur .bg {
    filter: blur(6px);
    transition: 0.3s;
}

/* CENTER TITLE */
.lettertext {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 200px;
    transform: translate(-50%, -50%);
    z-index: 10;
}

/* ORBIT */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
}

/* FOLDERS */
.folder {
    position: absolute;
    width: 90px;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: transform 0.2s ease;
}

.folder:hover {
    transform: translate(-50%, -55%) scale(1.1);
}

/* TOOLTIP */
.tooltip {
    position: absolute;
    background: pink;
    color: black;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 12px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -120%);
    transition: opacity 0.2s ease;
    z-index: 1000;
}

/* POPUP LAYER */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* WHITE LETTER BOX */
.letterBox {
    width: 60%;
    max-width: 600px;
    min-height: 300px;
    background: white;
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    font-family: Arial;
    overflow-y: auto;
}

/* TITLE + TEXT */
.letterBox h2 {
    margin: 0 0 10px 0;
}

.letterBox p {
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap; /* IMPORTANT: keeps formatting */
}

/* CLOSE BUTTON */
.closeBtn {
    position: absolute;
    right: 18%;
    bottom: 25%;
    width: 90px;
    cursor: pointer;
    transition: transform 0.3s ease;
    z-index: 1000;
}

.closeBtn:hover {
    transform: translateY(-8px);
}

/* BACK BUTTON */
.mainBack {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    cursor: pointer;
    transition: transform 0.3s ease;
    z-index: 20;
}

.mainBack:hover {
    transform: translateX(-50%) translateY(-8px);
}
</style>
</head>

const radius = 180;
let angle = 0;
let paused = false;

/* ORBIT */
function animate() {
    const step = (2 * Math.PI) / folders.length;

    folders.forEach((el, i) => {
        const a = angle + i * step;

        const x = radius * Math.cos(a);
        const y = radius * Math.sin(a);

        el.style.left = x + "px";
        el.style.top = y + "px";
    });

    if (!paused) angle += 0.006;

    requestAnimationFrame(animate);
}

/* EVENTS */
folders.forEach((f, i) => {

    f.addEventListener("mouseenter", () => {
        paused = true;
        tooltip.style.opacity = 1;
        tooltip.textContent = texts[i];
    });

    f.addEventListener("mousemove", (e) => {
        tooltip.style.left = e.pageX + "px";
        tooltip.style.top = (e.pageY + 20) + "px";
    });

    f.addEventListener("mouseleave", () => {
        paused = false;
        tooltip.style.opacity = 0;
    });

    f.addEventListener("click", () => {
        openLetter(i);
    });
});

function openLetter(i) {
    title.textContent = letters[i].title;
    content.textContent = letters[i].text;

    lightbox.style.display = "flex";
    paused = true;
    document.body.classList.add("blur");
}

function closeLetter() {
    lightbox.style.display = "none";
    paused = false;
    document.body.classList.remove("blur");
}
